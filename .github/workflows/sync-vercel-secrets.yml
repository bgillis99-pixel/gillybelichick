name: Sync Secrets to Vercel

# Reads ANTHROPIC_API_KEY and VERCEL_TOKEN from GitHub secrets and pushes the
# Anthropic key into the Vercel project's environment variables, then triggers
# a redeploy. Standardized on ANTHROPIC_API_KEY -- no fallback names.
# If your GitHub secret is named differently, rename it to ANTHROPIC_API_KEY.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-vercel-secrets.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Read secrets
        id: pick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e

          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::GitHub secret ANTHROPIC_API_KEY is empty or missing. Add it at github.com/bgillis99-pixel/gillybelichick/settings/secrets/actions (exact name: ANTHROPIC_API_KEY)."
            exit 1
          fi
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::GitHub secret VERCEL_TOKEN is empty or missing. Create a token at vercel.com/account/tokens, then add it as VERCEL_TOKEN."
            exit 1
          fi

          echo "Anthropic key: found (length ${#ANTHROPIC_API_KEY})"
          echo "Vercel token:  found (length ${#VERCEL_TOKEN})"

          # Mask so they don't leak in any log
          echo "::add-mask::$ANTHROPIC_API_KEY"
          echo "::add-mask::$VERCEL_TOKEN"

          # Expose to next step via GITHUB_ENV (already masked)
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> $GITHUB_ENV
          echo "VERCEL_TOKEN=$VERCEL_TOKEN" >> $GITHUB_ENV

      - name: Upsert ANTHROPIC_API_KEY in Vercel
        env:
          PROJECT_ID: prj_GHhK2uoD9LbGCqpEL7OW9Sq5Rkg6
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e

          echo "::group::Listing existing ANTHROPIC_API_KEY entries"
          EXISTING=$(curl -sS \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}&decrypt=false" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          IDS=$(echo "$EXISTING" | jq -r '.envs[]? | select(.key=="ANTHROPIC_API_KEY") | .id')
          echo "Existing ids to remove: ${IDS:-none}"
          echo "::endgroup::"

          echo "::group::Removing stale entries"
          for id in $IDS; do
            curl -sS -X DELETE \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env/${id}?teamId=${TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null
            echo "Deleted $id"
          done
          echo "::endgroup::"

          echo "::group::Creating fresh ANTHROPIC_API_KEY"
          BODY=$(jq -n --arg value "$ANTHROPIC_API_KEY" '{
            key: "ANTHROPIC_API_KEY",
            value: $value,
            type: "encrypted",
            target: ["production", "preview", "development"]
          }')
          RESPONSE=$(curl -sS -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESPONSE" | jq 'del(.value) | del(.created.value) | del(.updated.value)' || echo "$RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "::error::Vercel rejected the env var. Response above."
            exit 1
          fi
          echo "::endgroup::"

      - name: Trigger fresh production deployment
        env:
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e
          BODY=$(jq -n '{
            name: "gillybelichick",
            target: "production",
            gitSource: {
              type: "github",
              ref: "main",
              repoId: 1106334589
            }
          }')
          curl -sS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${TEAM_ID}&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" | jq '{id, url, readyState, error}'

      - name: Summary
        if: always()
        run: |
          {
            echo "### Samantha env sync"
            echo ""
            echo "- Check status: [gillybelichick.vercel.app/api/samantha/status](https://gillybelichick.vercel.app/api/samantha/status)"
            echo "- Vercel env vars: [settings page](https://vercel.com/carbcleantruckcheckapp/gillybelichick/settings/environment-variables)"
          } >> $GITHUB_STEP_SUMMARY
