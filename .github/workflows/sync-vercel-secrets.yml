name: Sync Secrets to Vercel

# Reads the Anthropic API key from GitHub secrets and pushes it into the
# Vercel project's environment variables, then triggers a redeploy.
# Tries multiple common secret names so Bryan doesn't have to rename anything.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-vercel-secrets.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pick secrets (try fallback names)
        id: pick
        env:
          # Anthropic key candidates
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          ANTHROPIC_TOKEN: ${{ secrets.ANTHROPIC_TOKEN }}
          # Vercel token candidates
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
        run: |
          set +e

          ANTHROPIC_NAME=""
          ANTHROPIC_VAL=""
          for name in ANTHROPIC_API_KEY CLAUDE_API_KEY ANTHROPIC_KEY ANTHROPIC_TOKEN; do
            val="${!name}"
            if [ -n "$val" ]; then
              ANTHROPIC_NAME="$name"
              ANTHROPIC_VAL="$val"
              break
            fi
          done

          VERCEL_NAME=""
          VERCEL_VAL=""
          for name in VERCEL_TOKEN VERCEL_API_TOKEN VERCEL_ACCESS_TOKEN; do
            val="${!name}"
            if [ -n "$val" ]; then
              VERCEL_NAME="$name"
              VERCEL_VAL="$val"
              break
            fi
          done

          echo "Anthropic key source: ${ANTHROPIC_NAME:-NONE FOUND}"
          echo "Vercel token source:  ${VERCEL_NAME:-NONE FOUND}"

          if [ -z "$ANTHROPIC_VAL" ]; then
            echo "::error::No Anthropic key found in GitHub secrets. Tried: ANTHROPIC_API_KEY, CLAUDE_API_KEY, ANTHROPIC_KEY, ANTHROPIC_TOKEN. Add the secret at github.com/bgillis99-pixel/gillybelichick/settings/secrets/actions with name ANTHROPIC_API_KEY."
            exit 1
          fi
          if [ -z "$VERCEL_VAL" ]; then
            echo "::error::No Vercel token found in GitHub secrets. Tried: VERCEL_TOKEN, VERCEL_API_TOKEN, VERCEL_ACCESS_TOKEN. Create one at vercel.com/account/tokens, then add as VERCEL_TOKEN secret."
            exit 1
          fi

          # Mask so they don't leak in any log
          echo "::add-mask::$ANTHROPIC_VAL"
          echo "::add-mask::$VERCEL_VAL"

          # Expose to next step via GITHUB_ENV (already masked)
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_VAL" >> $GITHUB_ENV
          echo "VERCEL_TOKEN=$VERCEL_VAL" >> $GITHUB_ENV

      - name: Upsert ANTHROPIC_API_KEY in Vercel
        env:
          PROJECT_ID: prj_GHhK2uoD9LbGCqpEL7OW9Sq5Rkg6
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e

          echo "::group::Listing existing ANTHROPIC_API_KEY entries"
          EXISTING=$(curl -sS \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}&decrypt=false" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          IDS=$(echo "$EXISTING" | jq -r '.envs[]? | select(.key=="ANTHROPIC_API_KEY") | .id')
          echo "Existing ids to remove: ${IDS:-none}"
          echo "::endgroup::"

          echo "::group::Removing stale entries"
          for id in $IDS; do
            curl -sS -X DELETE \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env/${id}?teamId=${TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null
            echo "Deleted $id"
          done
          echo "::endgroup::"

          echo "::group::Creating fresh ANTHROPIC_API_KEY"
          BODY=$(jq -n --arg value "$ANTHROPIC_API_KEY" '{
            key: "ANTHROPIC_API_KEY",
            value: $value,
            type: "encrypted",
            target: ["production", "preview", "development"]
          }')
          RESPONSE=$(curl -sS -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "$RESPONSE" | jq 'del(.value) | del(.created.value) | del(.updated.value)' || echo "$RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "::error::Vercel rejected the env var. Response above."
            exit 1
          fi
          echo "::endgroup::"

      - name: Trigger fresh production deployment
        env:
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e
          BODY=$(jq -n '{
            name: "gillybelichick",
            target: "production",
            gitSource: {
              type: "github",
              ref: "main",
              repoId: 1106334589
            }
          }')
          curl -sS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${TEAM_ID}&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" | jq '{id, url, readyState, error}'

      - name: Summary
        if: always()
        run: |
          {
            echo "### Samantha env sync"
            echo ""
            echo "- Check status: [gillybelichick.vercel.app/api/samantha/status](https://gillybelichick.vercel.app/api/samantha/status)"
            echo "- Vercel env vars: [settings page](https://vercel.com/carbcleantruckcheckapp/gillybelichick/settings/environment-variables)"
          } >> $GITHUB_STEP_SUMMARY
