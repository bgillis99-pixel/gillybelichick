name: Sync Secrets to Vercel

# Reads ANTHROPIC_API_KEY from GitHub secrets and pushes it into the
# Vercel project's environment variables, then triggers a redeploy.
# GitHub secrets are readable from inside Actions workflows; this is the
# only way to bridge them to Vercel without manual dashboard work.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-vercel-secrets.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert ANTHROPIC_API_KEY in Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROJECT_ID: prj_GHhK2uoD9LbGCqpEL7OW9Sq5Rkg6
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set in GitHub repo"
            exit 1
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set in GitHub repo"
            exit 1
          fi

          echo "::group::Checking existing ANTHROPIC_API_KEY in Vercel"
          EXISTING=$(curl -sS \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}&decrypt=false" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "$EXISTING" | jq -r '.envs[]? | select(.key=="ANTHROPIC_API_KEY") | "id=\(.id) target=\(.target)"' || true
          echo "::endgroup::"

          echo "::group::Removing any existing ANTHROPIC_API_KEY entries"
          IDS=$(echo "$EXISTING" | jq -r '.envs[]? | select(.key=="ANTHROPIC_API_KEY") | .id')
          for id in $IDS; do
            echo "Deleting env id: $id"
            curl -sS -X DELETE \
              "https://api.vercel.com/v10/projects/${PROJECT_ID}/env/${id}?teamId=${TEAM_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" | jq '.' || true
          done
          echo "::endgroup::"

          echo "::group::Creating ANTHROPIC_API_KEY in Vercel"
          BODY=$(jq -n --arg value "$ANTHROPIC_API_KEY" '{
            key: "ANTHROPIC_API_KEY",
            value: $value,
            type: "encrypted",
            target: ["production", "preview", "development"]
          }')

          RESPONSE=$(curl -sS -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT_ID}/env?teamId=${TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "$RESPONSE" | jq 'del(.value) | del(.created.value) | del(.updated.value)'

          if echo "$RESPONSE" | jq -e '.error' > /dev/null; then
            echo "::error::Failed to create env var"
            exit 1
          fi
          echo "::endgroup::"

      - name: Trigger fresh production deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TEAM_ID: team_KJwr5XAGPJ1qBHmDdkSPZ6pp
        run: |
          set -e
          echo "::group::Triggering redeploy"
          BODY=$(jq -n '{
            name: "gillybelichick",
            target: "production",
            gitSource: {
              type: "github",
              ref: "main",
              repoId: 1106334589
            }
          }')
          curl -sS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${TEAM_ID}&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" | jq '{id, url, readyState, error}'
          echo "::endgroup::"

      - name: Summary
        run: |
          echo "### Samantha env sync complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ANTHROPIC_API_KEY pushed to Vercel project gillybelichick" >> $GITHUB_STEP_SUMMARY
          echo "- Production redeploy triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Samantha should be live in ~60 seconds at gillybelichick.vercel.app" >> $GITHUB_STEP_SUMMARY
