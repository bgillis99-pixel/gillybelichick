<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#E8725A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.json">
  <title>Samantha</title>
  <style>
    :root {
      --cream: #FFF8F0; --coral: #E8725A; --amber: #F4A261;
      --text: #2D2D2D; --muted: #8B8B8B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--cream); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased; }
    #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: rgba(255,255,255,.8); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(232,114,90,.1); position: sticky; top: 0; z-index: 10; }
    .avatar { width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(232,114,90,.3); position: relative; }
    .avatar span { color: #fff; font-size: 18px; font-weight: 300; }
    .avatar .dot { position: absolute; bottom: -1px; right: -1px; width: 12px; height: 12px;
      border-radius: 50%; background: #4ade80; border: 2px solid #fff; }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 11px; color: var(--muted); }
    .header-btn { width: 32px; height: 32px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background .2s; }
    .voice-btn { background: #f3f4f6; color: var(--muted); }
    .voice-btn.on { background: rgba(232,114,90,.1); color: var(--coral); }
    .menu-btn { background: #f3f4f6; color: var(--muted); }

    /* Welcome */
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 16px 24px 24px; text-align: center; }
    .welcome-avatar { width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), var(--amber), #fb923c);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(232,114,90,.3); margin-bottom: 24px; position: relative; }
    .welcome-avatar span { color: #fff; font-size: 40px; font-weight: 200; }
    .welcome-avatar::after { content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(232,114,90,.3); animation: ping 3s ease-in-out infinite; }
    @keyframes ping { 0%,100% { transform: scale(1); opacity: .3; } 50% { transform: scale(1.15); opacity: 0; } }
    .welcome h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .welcome .subtitle { color: var(--coral); font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .welcome p { color: var(--muted); font-size: 14px; line-height: 1.5; max-width: 320px; }

    /* Quick actions */
    .quick-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      margin-top: 24px; max-width: 440px; }
    .quick-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px;
      border-radius: 999px; background: #fff; border: 1px solid #f3f4f6;
      box-shadow: 0 1px 3px rgba(0,0,0,.05); font-size: 14px; color: var(--text);
      cursor: pointer; transition: all .2s; white-space: nowrap; }
    .quick-btn:hover { border-color: rgba(232,114,90,.3); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .quick-btn:active { transform: scale(.95); }

    /* Chat */
    .chat { flex: 1; overflow-y: auto; padding: 16px; }
    .chat::-webkit-scrollbar { display: none; }
    .messages { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; flex-direction: column; animation: slideUp .3s ease-out; }
    .msg.user { align-items: flex-end; }
    .msg.sam { align-items: flex-start; }
    .bubble { max-width: 85%; border-radius: 16px; padding: 10px 16px; font-size: 15px; line-height: 1.5; }
    .msg.user .bubble { background: linear-gradient(135deg, var(--coral), var(--amber));
      color: #fff; border-bottom-right-radius: 6px; }
    .msg.sam .bubble { background: #fff; color: var(--text); border: 1px solid #f3f4f6;
      border-bottom-left-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .msg-time { font-size: 11px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Tool result cards */
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.04); margin-top: 8px; max-width: 85%; animation: slideUp .3s ease-out; }
    .card-bar { height: 3px; }
    .card-body { padding: 12px; display: flex; gap: 12px; }
    .card-icon { width: 40px; height: 40px; border-radius: 8px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
    .card-content { flex: 1; min-width: 0; }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .card-link { font-size: 12px; color: var(--coral); text-decoration: none; font-weight: 500; margin-top: 6px; display: inline-block; }
    .card-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }

    /* Typing */
    .typing { display: flex; align-items: center; gap: 6px; padding: 12px 16px;
      background: #fff; border-radius: 16px; border-bottom-left-radius: 6px;
      border: 1px solid #f3f4f6; width: fit-content; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--coral);
      animation: breathe 1.5s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes breathe { 0%,100% { opacity: .3; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }

    /* Input */
    .input-bar { border-top: 1px solid #f3f4f6; background: rgba(255,255,255,.9);
      backdrop-filter: blur(10px); padding: 8px 16px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    .input-row { max-width: 600px; margin: 0 auto; display: flex; align-items: flex-end; gap: 8px; }
    .mic-btn { width: 40px; height: 40px; border-radius: 50%; border: none;
      background: #f3f4f6; color: var(--muted); cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .mic-btn.listening { background: #ef4444; color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
    .input-field { flex: 1; resize: none; border: 1px solid #e5e7eb; border-radius: 20px;
      padding: 10px 16px; font-size: 15px; background: rgba(255,248,240,.5);
      color: var(--text); outline: none; font-family: inherit; max-height: 120px; }
    .input-field:focus { border-color: rgba(232,114,90,.4); box-shadow: 0 0 0 2px rgba(232,114,90,.1); }
    .input-field::placeholder { color: rgba(139,139,139,.6); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--coral), var(--amber));
      color: #fff; cursor: pointer; flex-shrink: 0; display: flex;
      align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(232,114,90,.3);
      transition: all .2s; }
    .send-btn:disabled { opacity: .4; box-shadow: none; }
    .send-btn:active { transform: scale(.95); }

    /* Chalkboard */
    .board-btn { position: relative; background: #f3f4f6; color: var(--muted); }
    .board-btn.has-items { background: rgba(232,114,90,.1); color: var(--coral); }
    .board-count { position: absolute; top: -4px; right: -4px; min-width: 16px; height: 16px;
      padding: 0 4px; border-radius: 999px; background: var(--coral); color: #fff;
      font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .board-count.hidden { display: none; }
    .board-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      background: rgba(0,0,0,.4); display: none; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s ease-out; }
    .board-panel.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .board-sheet { width: 100%; max-width: 600px; max-height: 80vh; background: var(--cream);
      border-radius: 24px 24px 0 0; display: flex; flex-direction: column;
      animation: slideUpSheet .3s cubic-bezier(.2,.8,.2,1); overflow: hidden; }
    @keyframes slideUpSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .board-head { display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid rgba(232,114,90,.12); background: #fff; }
    .board-head h3 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .board-close { background: #f3f4f6; border: none; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; color: var(--muted); display: flex;
      align-items: center; justify-content: center; }
    .board-body { overflow-y: auto; flex: 1; padding: 12px 16px 16px; }
    .board-add { display: flex; gap: 8px; margin-bottom: 12px; }
    .board-add input { flex: 1; border: 1px solid #e5e7eb; border-radius: 20px;
      padding: 10px 14px; font-size: 14px; background: #fff; outline: none; font-family: inherit; }
    .board-add input:focus { border-color: rgba(232,114,90,.4); box-shadow: 0 0 0 2px rgba(232,114,90,.1); }
    .board-add button { width: 40px; height: 40px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--coral), var(--amber)); color: #fff;
      cursor: pointer; font-size: 18px; font-weight: 300; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 2px 8px rgba(232,114,90,.3); }
    .board-list { display: flex; flex-direction: column; gap: 8px; }
    .board-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 16px;
      font-style: italic; }
    .board-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px;
      background: #fff; border-radius: 12px; border: 1px solid #f3f4f6;
      box-shadow: 0 1px 3px rgba(0,0,0,.04); animation: slideUp .25s ease-out; }
    .board-item.done { opacity: .55; background: #fafafa; }
    .board-item .check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db;
      flex-shrink: 0; cursor: pointer; margin-top: 1px; display: flex; align-items: center;
      justify-content: center; transition: all .15s; }
    .board-item .check.checked { background: var(--coral); border-color: var(--coral); color: #fff;
      font-size: 12px; }
    .board-item.done .text { text-decoration: line-through; color: var(--muted); }
    .board-item .text { flex: 1; font-size: 14px; line-height: 1.4; word-break: break-word; }
    .board-item .due { font-size: 11px; color: var(--coral); margin-top: 2px; font-weight: 500; }
    .board-item .del { background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 16px; padding: 0 4px; opacity: .4; transition: opacity .15s; }
    .board-item .del:hover { opacity: 1; color: #ef4444; }
    .board-section { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase;
      letter-spacing: .05em; margin: 16px 0 6px; padding: 0 4px; }
    .board-section:first-child { margin-top: 0; }

    /* Todo card inside chat */
    .todo-card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb;
      padding: 10px 12px; margin-top: 8px; max-width: 85%; display: flex; align-items: center;
      gap: 8px; animation: slideUp .3s ease-out; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .todo-card .dot-icon { width: 8px; height: 8px; border-radius: 50%;
      background: var(--coral); flex-shrink: 0; }
    .todo-card .label { font-size: 13px; font-weight: 500; flex: 1; }

    /* Office scene */
    .scene { position: relative; width: 100%; height: 180px; overflow: hidden;
      background: linear-gradient(180deg, #FFF2E0 0%, #FDE4C8 100%);
      border-bottom: 1px solid rgba(232,114,90,.12); transition: height .35s ease; flex-shrink: 0; }
    .scene.compact { height: 96px; }
    .scene svg { width: 100%; height: 100%; display: block; transition: transform .35s ease; transform-origin: 50% 54%; }
    /* In compact mode the SVG natural slice already centers on her face -- no transform needed */
    .scene-toggle { position: absolute; top: 6px; right: 8px; width: 24px; height: 24px;
      border-radius: 50%; background: rgba(255,255,255,.6); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--muted);
      font-size: 14px; z-index: 2; backdrop-filter: blur(4px); }
    .scene-toggle:active { transform: scale(.92); }
    .sam-breath { animation: samBreath 4.5s ease-in-out infinite; transform-origin: 200px 120px; }
    @keyframes samBreath { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.01) translateY(-0.5px); } }
    .sam-blink { animation: samBlink 6s ease-in-out infinite; }
    @keyframes samBlink { 0%,94%,100% { opacity: 1; } 96%,98% { opacity: 0; } }
    .sun-glow { animation: sunGlow 7s ease-in-out infinite; transform-origin: 280px 75px; }
    @keyframes sunGlow { 0%,100% { opacity: .88; } 50% { opacity: 1; transform: scale(1.04); } }

    /* Samantha workload states: hair-down (calm) vs hair-up (buried) */
    .hair-up, .accessories-busy { display: none; }
    .scene.busy .hair-down { display: none; }
    .scene.busy .hair-up, .scene.busy .accessories-busy { display: block; }
    .scene.busy .sam-breath { animation-duration: 3.2s; }
    /* Subtle status text overlay when busy */
    .scene-status { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--coral); font-weight: 600; letter-spacing: .02em;
      background: rgba(255,255,255,.85); padding: 3px 10px; border-radius: 999px;
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .scene.busy .scene-status { opacity: 1; }
    .scene.compact .scene-status { display: none; }

    /* Speech bubble connector for Samantha's messages - looks like it emerges from her */
    .msg.sam .bubble { position: relative; }
    .msg.sam:first-of-type .bubble::before {
      content: ''; position: absolute; top: -12px; left: 16px; width: 2px; height: 12px;
      background: linear-gradient(180deg, transparent, rgba(232,114,90,.25)); border-radius: 2px;
    }

    /* Brian response (tap-able options) */
    .options { display: flex; flex-direction: column; gap: 6px; margin-top: 8px;
      max-width: 85%; animation: slideUp .3s ease-out; }
    .options-q { font-size: 12px; color: var(--muted); padding: 0 4px 2px; font-weight: 500; }
    .option { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
      text-align: left; font-family: inherit; font-size: 14px; color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: all .15s; }
    .option:hover { border-color: rgba(232,114,90,.4); box-shadow: 0 2px 8px rgba(232,114,90,.12); transform: translateY(-1px); }
    .option:active { transform: scale(.98); }
    .option.used { opacity: .5; pointer-events: none; }
    .option-emoji { font-size: 20px; flex-shrink: 0; }
    .option-content { flex: 1; min-width: 0; }
    .option-label { font-weight: 500; line-height: 1.3; }
    .option-detail { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.3; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="avatar"><span>S</span><div class="dot"></div></div>
    <div class="header-info"><h1>Samantha</h1><p>command center active</p></div>
    <button class="header-btn board-btn" id="boardBtn" title="Chalkboard">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <span class="board-count hidden" id="boardCount">0</span>
    </button>
    <button class="header-btn voice-btn" id="voiceToggle" title="Toggle voice output">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
    </button>
    <button class="header-btn menu-btn" id="menuBtn" title="Menu">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
    </button>
  </div>

  <div class="scene" id="scene">
    <button class="scene-toggle" id="sceneToggle" title="Collapse scene" aria-label="Toggle scene">−</button>
    <div class="scene-status" id="sceneStatus">heads down · full plate</div>
    <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <radialGradient id="roomGlow" cx="50%" cy="35%" r="75%">
          <stop offset="0" stop-color="#FFF5E6"/>
          <stop offset="1" stop-color="#F9DEC0"/>
        </radialGradient>
        <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FFF0D8"/>
          <stop offset="0.35" stop-color="#FFCF95"/>
          <stop offset="0.7" stop-color="#F4A261"/>
          <stop offset="1" stop-color="#E8725A"/>
        </linearGradient>
        <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#B58A68"/>
          <stop offset="1" stop-color="#7F5539"/>
        </linearGradient>
        <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#FBE4CE"/>
          <stop offset="1" stop-color="#EECCAF"/>
        </linearGradient>
        <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#E8C77A"/>
          <stop offset="0.5" stop-color="#D4A857"/>
          <stop offset="1" stop-color="#B8923F"/>
        </linearGradient>
        <linearGradient id="blouse" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#F8F0E3"/>
          <stop offset="1" stop-color="#E8DCC8"/>
        </linearGradient>
        <radialGradient id="sunDisc" cx="50%" cy="50%" r="50%">
          <stop offset="0" stop-color="#FFFAEC"/>
          <stop offset="0.6" stop-color="#FFE8A8"/>
          <stop offset="1" stop-color="#FFD480" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- Room background -->
      <rect width="400" height="200" fill="url(#roomGlow)"/>

      <!-- Window -->
      <rect x="55" y="14" width="290" height="120" fill="url(#sunset)" rx="2"/>
      <!-- Sun glow -->
      <circle class="sun-glow" cx="280" cy="75" r="28" fill="url(#sunDisc)"/>
      <!-- Distant skyline hint -->
      <path d="M 55 110 L 95 110 L 95 100 L 115 100 L 115 108 L 140 108 L 140 95 L 165 95 L 165 110 L 195 110 L 195 102 L 218 102 L 218 110 L 245 110 L 245 98 L 265 98 L 265 110 L 290 110 L 290 105 L 310 105 L 310 110 L 345 110 L 345 134 L 55 134 Z" fill="#C86B52" opacity="0.25"/>
      <!-- Window frame -->
      <rect x="55" y="14" width="290" height="120" fill="none" stroke="#C9A374" stroke-width="2"/>
      <line x1="200" y1="14" x2="200" y2="134" stroke="#C9A374" stroke-width="1.5"/>
      <line x1="55" y1="74" x2="345" y2="74" stroke="#C9A374" stroke-width="1.5"/>

      <!-- Wall shelf left -->
      <rect x="18" y="42" width="30" height="58" fill="#FFF5E6" stroke="#D6B78D" stroke-width="1" rx="2"/>
      <line x1="18" y1="62" x2="48" y2="62" stroke="#D6B78D" stroke-width="0.8"/>
      <line x1="18" y1="82" x2="48" y2="82" stroke="#D6B78D" stroke-width="0.8"/>
      <!-- Books -->
      <rect x="21" y="48" width="3" height="12" fill="#B55"/>
      <rect x="25" y="48" width="3" height="12" fill="#558"/>
      <rect x="29" y="48" width="3" height="12" fill="#875"/>
      <rect x="33" y="48" width="3" height="12" fill="#385"/>

      <!-- Plant right -->
      <ellipse cx="368" cy="132" rx="14" ry="4" fill="#6F4A33"/>
      <path d="M 354 128 L 382 128 L 378 145 L 358 145 Z" fill="#8B5A3C"/>
      <path d="M 368 128 Q 358 108 356 88" fill="none" stroke="#6B8E4E" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M 368 128 Q 368 105 365 82" fill="none" stroke="#7AA25C" stroke-width="2.2" stroke-linecap="round"/>

        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>
      </button>

<script>
const API = '/api/samantha';
const STORAGE_KEY = 'samantha_messages';
const quickActions = [
  ["What's on my calendar today?", "📅"], ["Check my latest emails", "📧"],
  ["Look up a truck company", "🚛"], ["Directions to my next job", "🗺️"],
  ["Find diesel shops near me", "🔧"], ["Text a customer", "💬"],
  ["Help me draft an invoice", "💰"], ["CARB compliance question", "📋"],
];

let messages = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let isLoading = false;
let voiceEnabled = localStorage.getItem('samantha_voice') === 'true';
let recognition = null;

// DOM
const $ = s => document.querySelector(s);
const welcomeEl = $('#welcome'), chatEl = $('#chatArea'), msgsEl = $('#messages');
const inputEl = $('#input'), sendEl = $('#sendBtn'), micEl = $('#micBtn');
const voiceEl = $('#voiceToggle'), menuEl = $('#menuBtn');

// Init quick actions
const qaEl = $('#quickActions');
quickActions.forEach(([label, icon]) => {
  const btn = document.createElement('button');
  btn.className = 'quick-btn';
  btn.innerHTML = `<span>${icon}</span><span>${label}</span>`;
  btn.onclick = () => sendMessage(label);
  qaEl.appendChild(btn);
});

// Voice toggle
voiceEl.className = 'header-btn voice-btn' + (voiceEnabled ? ' on' : '');
voiceEl.onclick = () => {
  voiceEnabled = !voiceEnabled;
  localStorage.setItem('samantha_voice', voiceEnabled);
  voiceEl.className = 'header-btn voice-btn' + (voiceEnabled ? ' on' : '');
};

// Menu
menuEl.onclick = () => {
  if (confirm('Clear conversation?')) {
    messages = []; localStorage.removeItem(STORAGE_KEY);
    msgsEl.innerHTML = '';
    welcomeEl.style.display = 'flex'; chatEl.style.display = 'none';
  }
};

// Input handling
inputEl.oninput = () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  sendEl.disabled = !inputEl.value.trim() || isLoading;
};
inputEl.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); } };
sendEl.onclick = () => sendMessage(inputEl.value);

// Mic
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRec) micEl.style.display = 'none';
micEl.onclick = () => {
  if (micEl.classList.contains('listening')) {
    recognition?.stop(); micEl.classList.remove('listening'); return;
  }
  recognition = new SpeechRec();
  recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
  recognition.onresult = e => {
    let t = ''; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript;
    inputEl.value = t; inputEl.oninput();
    if (e.results[e.results.length-1].isFinal && t.trim()) {
      setTimeout(() => { sendMessage(t.trim()); micEl.classList.remove('listening'); }, 300);
    }
  };
  recognition.onend = () => micEl.classList.remove('listening');
  recognition.onerror = () => micEl.classList.remove('listening');
  recognition.start(); micEl.classList.add('listening');
};

// TTS
function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen'))
    || voices.find(v => v.lang.startsWith('en-'));
  if (v) u.voice = v;
  u.rate = 0.95; u.pitch = 1.05;
  speechSynthesis.speak(u);
}
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

// Scene (office) toggle
const sceneEl = $('#scene'), sceneToggleEl = $('#sceneToggle');
let sceneCompact = localStorage.getItem('samantha_scene_compact') === 'true';
function applySceneState() {
  if (sceneCompact) { sceneEl.classList.add('compact'); sceneToggleEl.textContent = '+'; sceneToggleEl.title = 'Expand scene'; }
  else { sceneEl.classList.remove('compact'); sceneToggleEl.textContent = '−'; sceneToggleEl.title = 'Compact scene'; }
}
applySceneState();
sceneToggleEl.onclick = () => {
  sceneCompact = !sceneCompact;
  localStorage.setItem('samantha_scene_compact', sceneCompact);
  applySceneState();
};

// Render
function renderMessages() {
  if (messages.length === 0) {
    welcomeEl.style.display = 'flex'; chatEl.style.display = 'none';
    // Restore user's scene preference (full scene in welcome state by default)
    applySceneState();
    return;
  }
  welcomeEl.style.display = 'none'; chatEl.style.display = 'block';
  // Auto-compact scene during active chat for more chat room (user can still toggle)
  if (!sceneCompact) { sceneEl.classList.add('compact'); sceneToggleEl.textContent = '+'; }
  msgsEl.innerHTML = messages.map(m => {
    const time = new Date(m.timestamp).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    let cards = '';
    if (m.toolResults) cards = m.toolResults.map(renderCard).join('');
    return `<div class="msg ${m.role === 'user' ? 'user' : 'sam'}">
      <div class="bubble">${esc(m.content)}</div>${cards}
      <div class="msg-time">${time}</div></div>`;
  }).join('');
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderCard(r) {
  if (r.type === 'calendar') {
    const d = r.data, t = new Date(d.start).toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,var(--coral),var(--amber))"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(232,114,90,.1)">📅</div>
      <div class="card-content"><div class="card-title">${esc(d.title)}</div>
      <div class="card-detail">${t}</div>${d.location?`<div class="card-detail">📍 ${esc(d.location)}</div>`:''}</div></div></div>`;
  }
  if (r.type === 'email') {
    const d = r.data;
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,var(--amber),#fbbf24)"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(244,162,97,.1)">📧</div>
      <div class="card-content"><div class="card-title">${esc(d.from)}</div>
      <div class="card-detail" style="font-weight:500">${esc(d.subject)}</div>
      <div class="card-detail">${esc(d.snippet||'')}</div></div></div></div>`;
  }
  if (r.type === 'company') {
    const d = r.data;
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,#60a5fa,#3b82f6)"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(59,130,246,.1)">🚛</div>
      <div class="card-content"><div class="card-title">${esc(d.name)}</div>
      ${d.dotNumber?`<div class="card-detail">DOT# ${d.dotNumber}</div>`:''}
      ${d.vehicles?`<div class="card-detail">${d.vehicles} vehicles</div>`:''}
      ${d.safetyRating?`<div class="card-detail"><span class="card-badge" style="background:${d.safetyRating==='Satisfactory'?'#dcfce7;color:#15803d':'#fef9c3;color:#a16207'}">${d.safetyRating}</span></div>`:''}
      ${d.phone?`<a href="tel:${d.phone}" class="card-link">📞 ${d.phone}</a>`:''}</div></div></div>`;
  }
  if (r.type === 'directions') {
    const d = r.data;
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,#4ade80,#22c55e)"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(34,197,94,.1)">🗺️</div>
      <div class="card-content"><div class="card-title">${d.distance} · ${d.duration}</div>
      <div class="card-detail">To: ${esc(d.destination)}</div>
      ${d.mapUrl?`<a href="${d.mapUrl}" target="_blank" class="card-link">Open in Maps ↗</a>`:''}</div></div></div>`;
  }
  if (r.type === 'sms') {
    const d = r.data, link = `sms:${d.to.replace(/[^\d+]/g,'')}?body=${encodeURIComponent(d.body)}`;
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,#2dd4bf,#06b6d4)"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(6,182,212,.1)">💬</div>
      <div class="card-content"><div class="card-title">To: ${esc(d.to)}</div>
      <div class="card-detail">${esc(d.body)}</div>
      <a href="${link}" class="card-link" style="background:var(--coral);color:#fff;padding:6px 14px;border-radius:8px;display:inline-block;margin-top:8px">Send via Messages</a></div></div></div>`;
  }
  if (r.type === 'places') {
    const d = r.data;
    return `<div class="card"><div class="card-bar" style="background:linear-gradient(90deg,#a78bfa,#7c3aed)"></div>
      <div class="card-body"><div class="card-icon" style="background:rgba(124,58,237,.1)">📍</div>
      <div class="card-content"><div class="card-title">${esc(d.name)}</div>
      <div class="card-detail">${esc(d.address)}</div>
      ${d.rating?`<div class="card-detail" style="color:var(--amber)">${'★'.repeat(Math.round(d.rating))} ${d.rating}</div>`:''}
      ${d.mapUrl?`<a href="${d.mapUrl}" target="_blank" class="card-link">View on map ↗</a>`:''}</div></div></div>`;
  }
  if (r.type === 'todo') {
    const d = r.data, due = fmtDue(d.due);
    return `<div class="todo-card"><div class="dot-icon"></div>
      <div class="label">📋 Added: ${esc(d.text)}${due?` <span style="color:var(--coral);font-size:11px">· ${due}</span>`:''}</div></div>`;
  }
  if (r.type === 'options') {
    const d = r.data;
    const used = d.used ? 'used' : '';
    const opts = (d.options || []).map((o, i) => {
      const emoji = o.emoji || ['①','②','③','④','⑤','⑥'][i] || '•';
      const detail = o.detail ? `<div class="option-detail">${esc(o.detail)}</div>` : '';
      return `<button class="option ${used}" data-opt-label="${esc(o.label)}">
        <span class="option-emoji">${emoji}</span>
        <div class="option-content"><div class="option-label">${esc(o.label)}</div>${detail}</div>
      </button>`;
    }).join('');
    const q = d.question ? `<div class="options-q">${esc(d.question)}</div>` : '';
    return `<div class="options">${q}${opts}</div>`;
  }
  return '';
}

function esc(s) {
  let out = (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Auto-link URLs (http/https)
  out = out.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--coral);text-decoration:underline">$1</a>');
  // Markdown-style **bold**
  out = out.replace(/\*\*([^*\n]+)\*\*/g, '<b>$1</b>');
  // Newlines
  out = out.replace(/\n/g,'<br>');
  return out;
}

// Send
async function sendMessage(text) {
  text = text.trim(); if (!text || isLoading) return;
  inputEl.value = ''; inputEl.style.height = 'auto'; sendEl.disabled = true;

  const userMsg = { id: 'u'+Date.now(), role: 'user', content: text, timestamp: Date.now() };
  messages.push(userMsg);
  save(); renderMessages();

  // Show typing
  isLoading = true;
  updateSamState();
  const typingEl = document.createElement('div');
  typingEl.className = 'msg sam';
  typingEl.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgsEl.appendChild(typingEl);
  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const history = messages.slice(-20).map(m => ({ role: m.role, content: m.content }));
    let resp = await callChat(history);
    let allCards = [];

    // Tool use loop
    let rounds = 0;
    while (resp.tool_calls && resp.tool_calls.length > 0 && rounds < 5) {
      rounds++;
      const results = [];
      for (const tc of resp.tool_calls) {
        const { result, cards } = await callTool(tc.name, tc.input);
        if (cards) allCards.push(...cards);
        results.push({ tool_use_id: tc.id, content: result });
      }
      resp = await callChat([...history,
        { role: 'assistant', content: resp.raw_content },
        { role: 'user', content: JSON.stringify(results) }
      ]);
    }

    const samMsg = {
      id: 's'+Date.now(), role: 'assistant',
      content: resp.text || "Hmm, couldn't process that. Try again?",
      timestamp: Date.now(),
      toolResults: allCards.length > 0 ? allCards : undefined
    };
    messages.push(samMsg); save();
    if (voiceEnabled) speak(samMsg.content);
  } catch (e) {
    messages.push({ id: 'e'+Date.now(), role: 'assistant',
      content: e.message?.includes('API error')
        ? "Having trouble connecting. Check your signal."
        : "Something went sideways. Give me a sec.",
      timestamp: Date.now() });
    save();
  } finally {
    isLoading = false;
    updateSamState();
    typingEl.remove();
    renderMessages();
  }
}

async function callChat(msgs) {
  const r = await fetch(API+'/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:msgs}) });
  if (!r.ok) throw new Error('API error: '+r.status);
  return r.json();
}

async function callTool(name, input) {
  if (name === 'get_current_datetime') {
    const now = new Date();
    return { result: JSON.stringify({ date: now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}), time: now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}), timezone: Intl.DateTimeFormat().resolvedOptions().timeZone }) };
  }

  // Brian response: present multiple choice options for Bryan to tap
  if (name === 'ask_bryan') {
    const options = Array.isArray(input.options) ? input.options : [];
    return {
      result: JSON.stringify({ presented: true, options: options.map(o => o.label) }),
      cards: [{ type: 'options', data: { question: input.question || '', options } }]
    };
  }

  // Chalkboard tools run entirely client-side
  if (name === 'add_todo') {
    const t = addTodoLocal(input.text || '', input.due);
    return { result: JSON.stringify({ ok: true, id: t.id, text: t.text, due: t.due, open_count: countOpen() }),
      cards: [{ type: 'todo', data: { text: t.text, due: t.due } }] };
  }
  if (name === 'list_todos') {
    const openOnly = input?.status !== 'all';
    const list = (openOnly ? todos.filter(t => !t.done) : todos)
      .map(t => ({ id: t.id, text: t.text, due: t.due, done: t.done }))
      .slice(-50);
    return { result: JSON.stringify({ todos: list, open_count: countOpen(), total: todos.length }) };
  }
  if (name === 'complete_todo') {
    const t = todos.find(x => x.id === input.id) ||
              todos.find(x => !x.done && x.text.toLowerCase().includes((input.text||'').toLowerCase()));
    if (!t) return { result: JSON.stringify({ ok: false, error: 'Not found' }) };
    t.done = true; t.completedAt = Date.now();
    saveBoard(); renderBoard();
    return { result: JSON.stringify({ ok: true, completed: t.text, open_count: countOpen() }) };
  }
  if (name === 'delete_todo') {
    const before = todos.length;
    if (input.id) todos = todos.filter(x => x.id !== input.id);
    else if (input.text) todos = todos.filter(x => !x.text.toLowerCase().includes(input.text.toLowerCase()));
    saveBoard(); renderBoard();
    return { result: JSON.stringify({ ok: true, removed: before - todos.length, open_count: countOpen() }) };
  }

  const routeMap = {
    get_calendar_events: ['calendar',{action:'get_calendar_events'}],
    create_calendar_event: ['calendar',{action:'create_calendar_event'}],
    search_emails: ['email',{action:'search_emails'}],
    read_email: ['email',{action:'read_email'}],
    draft_email: ['email',{action:'draft_email'}],
    lookup_company: ['company',{}],
    get_directions: ['maps',{action:'get_directions'}],
    find_places: ['maps',{action:'find_places'}],
    send_sms: ['sms',{action:'send_sms'}],
    schedule_17_week_followup: ['followup',{action:'schedule_17_week_followup'}],
    get_upcoming_retests: ['followup',{action:'get_upcoming_retests'}],
    list_projects: ['asana',{action:'list_projects'}],
    list_tasks: ['asana',{action:'list_tasks'}],
    search_tasks: ['asana',{action:'search_tasks'}],
    create_task: ['asana',{action:'create_task'}],
    list_blog_posts: ['blog',{action:'list_posts'}],
    read_blog_post: ['blog',{action:'read_post'}],
    create_blog_post: ['blog',{action:'create_post'}],
    create_invoice: ['invoice',{action:'create_invoice'}],
    get_pricing: ['invoice',{action:'get_pricing'}],
  };

  const route = routeMap[name];
  if (!route) return { result: JSON.stringify({error:'Unknown tool'}) };

  const [endpoint, extra] = route;
  const body = endpoint === 'company' ? { params: input } : { ...extra, params: input };
  const r = await fetch(`${API}/${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json();

  // Build cards
  const cards = [];
  if (name === 'get_calendar_events' && data.events) data.events.forEach(e => cards.push({type:'calendar',data:e}));
  if (name === 'create_calendar_event' && data.event) cards.push({type:'calendar',data:data.event});
  if (name === 'search_emails' && data.emails) data.emails.forEach(e => cards.push({type:'email',data:e}));
  if (name === 'lookup_company' && data.company) cards.push({type:'company',data:data.company});
  if (name === 'get_directions' && data.origin) cards.push({type:'directions',data:data});
  if (name === 'find_places' && data.places) data.places.forEach(p => cards.push({type:'places',data:p}));
  if (name === 'send_sms') cards.push({type:'sms',data:{to:input.to,body:input.body,status:data.status||'ready'}});
  if (name === 'schedule_17_week_followup' && data.events) data.events.forEach(e => cards.push({type:'calendar',data:{id:'f'+Date.now(),title:e.title,start:e.start,end:e.end,location:e.location}}));

  // For 17-week followup, also create the calendar events
  if (name === 'schedule_17_week_followup' && data.events) {
    for (const evt of data.events) {
      await fetch(`${API}/calendar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'create_calendar_event',params:evt}) });
    }
  }
  if (name === 'get_upcoming_retests' && data.search_params) {
    const cal = await (await fetch(`${API}/calendar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'get_calendar_events',params:data.search_params}) })).json();
    if (cal.events) cal.events.forEach(e => cards.push({type:'calendar',data:e}));
    return { result: JSON.stringify(cal), cards };
  }

  return { result: JSON.stringify(data), cards: cards.length ? cards : undefined };
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages.slice(-100))); } catch(e) { localStorage.removeItem(STORAGE_KEY); }
}

/* ============================ CHALKBOARD ============================ */
const BOARD_KEY = 'samantha_chalkboard';
let todos = JSON.parse(localStorage.getItem(BOARD_KEY) || '[]');

const boardBtn = $('#boardBtn'), boardPanel = $('#boardPanel'), boardClose = $('#boardClose');
const boardList = $('#boardList'), boardInput = $('#boardInput'), boardAddBtn = $('#boardAddBtn');
const boardCount = $('#boardCount');

function saveBoard() { localStorage.setItem(BOARD_KEY, JSON.stringify(todos.slice(-300))); }

function countOpen() { return todos.filter(t => !t.done).length; }

function updateBoardBadge() {
  const n = countOpen();
  if (n === 0) {
    boardCount.classList.add('hidden');
    boardBtn.classList.remove('has-items');
  } else {
    boardCount.classList.remove('hidden');
    boardCount.textContent = n > 99 ? '99+' : String(n);
    boardBtn.classList.add('has-items');
  }
  updateSamState();
}

// Visual workload signal: hair up + glasses when buried.
// Trigger: 6+ open todos OR currently processing a message.
const sceneStatusEl = document.querySelector('#sceneStatus');
function updateSamState() {
  const open = countOpen();
  const busy = open >= 6 || isLoading;
  sceneEl.classList.toggle('busy', busy);
  if (busy) {
    const msg = isLoading
      ? (open >= 10 ? 'on it · plate is full' : 'working on it')
      : (open >= 15 ? 'drowning · pick top 3?' : open >= 10 ? 'a lot on the plate' : 'heads down · focused');
    sceneStatusEl.textContent = msg;
  }
}

function fmtDue(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const now = new Date(), diff = d - now, day = 864e5;
  if (diff < 0) return 'Overdue · ' + d.toLocaleDateString([], {month:'short', day:'numeric'});
  if (diff < day) return 'Today';
  if (diff < 2*day) return 'Tomorrow';
  if (diff < 7*day) return d.toLocaleDateString([], {weekday:'long'});
  return d.toLocaleDateString([], {month:'short', day:'numeric'});
}

function renderBoard() {
  updateBoardBadge();
  if (todos.length === 0) {
    boardList.innerHTML = '<div class="board-empty">Nothing on the chalkboard yet.<br>Tell Samantha to "add a to-do" or type one above.</div>';
    return;
  }
  const open = todos.filter(t => !t.done).sort((a,b) => {
    if (a.due && !b.due) return -1;
    if (!a.due && b.due) return 1;
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    return b.createdAt - a.createdAt;
  });
  const done = todos.filter(t => t.done).sort((a,b) => (b.completedAt||0) - (a.completedAt||0)).slice(0, 10);

  const item = t => {
    const due = fmtDue(t.due);
    return `<div class="board-item ${t.done?'done':''}" data-id="${t.id}">
      <div class="check ${t.done?'checked':''}" data-act="toggle" data-id="${t.id}">${t.done?'✓':''}</div>
      <div class="text">${esc(t.text)}${due?`<div class="due">${due}</div>`:''}</div>
      <button class="del" data-act="delete" data-id="${t.id}" aria-label="Delete">×</button>
    </div>`;
  };

  let html = '';
  if (open.length) html += '<div class="board-section">Open (' + open.length + ')</div>' + open.map(item).join('');
  if (done.length) html += '<div class="board-section">Recently done</div>' + done.map(item).join('');
  boardList.innerHTML = html;
}

boardList.addEventListener('click', e => {
  const el = e.target.closest('[data-act]');
  if (!el) return;
  const id = el.dataset.id, act = el.dataset.act;
  const t = todos.find(x => x.id === id); if (!t) return;
  if (act === 'toggle') {
    t.done = !t.done;
    t.completedAt = t.done ? Date.now() : null;
  } else if (act === 'delete') {
    todos = todos.filter(x => x.id !== id);
  }
  saveBoard(); renderBoard();
});

function addTodoLocal(text, due) {
  const t = {
    id: 'td' + Date.now() + Math.random().toString(36).slice(2,6),
    text: text.trim(),
    due: due || null,
    done: false,
    createdAt: Date.now()
  };
  todos.push(t);
  saveBoard(); renderBoard();
  return t;
}

boardBtn.onclick = () => { boardPanel.classList.add('open'); renderBoard(); setTimeout(() => boardInput.focus(), 300); };
boardClose.onclick = () => boardPanel.classList.remove('open');
boardPanel.onclick = e => { if (e.target === boardPanel) boardPanel.classList.remove('open'); };

boardAddBtn.onclick = () => {
  const v = boardInput.value.trim();
  if (v) { addTodoLocal(v); boardInput.value = ''; boardInput.focus(); }
};
boardInput.onkeydown = e => {
  if (e.key === 'Enter') { e.preventDefault(); boardAddBtn.onclick(); }
};

updateBoardBadge();
/* ============================ /CHALKBOARD ============================ */

/* ============================ BRIAN RESPONSE ============================ */
// Delegated handler: tap any option button in the chat to answer with that label.
// Also marks the tapped set as "used" so it's visually obvious which ones are done.
msgsEl.addEventListener('click', e => {
  const btn = e.target.closest('.option');
  if (!btn || btn.classList.contains('used')) return;
  const label = btn.dataset.optLabel || btn.innerText.trim();
  // Mark all siblings in this options group as used
  const group = btn.closest('.options');
  if (group) group.querySelectorAll('.option').forEach(b => b.classList.add('used'));
  // Send the selection as Bryan's next message
  sendMessage(label);
});
/* ============================ /BRIAN RESPONSE ============================ */

// Boot
renderMessages();
</script>
</body>
</html>
